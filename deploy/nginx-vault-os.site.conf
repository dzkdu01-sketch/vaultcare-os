# HTTP：域名 vault-os.site（将 ROOT 替换为项目根，例如 /var/www/vault-os1.1）
# 在已安装 Nginx、PM2、本项目的 Ubuntu VPS 上：
#   sed 替换 ROOT_PLACEHOLDER 后放到 sites-available，再执行 deploy/setup-https-vault-os-site.sh 申请证书。
#
# 注意：不要用本配置部署到当前解析为「虚拟主机 / LiteSpeed」的 IP；域名 A 记录须指向本 Nginx 所在 VPS。

server {
    listen 80;
    listen [::]:80;
    server_name vault-os.site;

    root ROOT_PLACEHOLDER/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        send_timeout 900s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
