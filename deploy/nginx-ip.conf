# 仅 HTTP + IP 访问示例。复制到 /etc/nginx/sites-available/ 后按需改名并启用。
# 将 ROOT 替换为实际路径，例如 /var/www/vault-os1.1
#
# sudo cp nginx-ip.conf /etc/nginx/sites-available/vault-os11
# sudo sed -i 's|ROOT_PLACEHOLDER|/var/www/vault-os1.1|g' /etc/nginx/sites-available/vault-os11
# sudo ln -sf /etc/nginx/sites-available/vault-os11 /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root ROOT_PLACEHOLDER/frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 全量同步等多商品 Woo 请求可能超过默认 60s，否则 Nginx 返回 504、Woo 仅部分写入
        proxy_connect_timeout 900s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
        send_timeout 900s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
